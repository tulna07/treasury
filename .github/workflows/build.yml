name: Build Images

on:
  push:
    branches: [main, master]

jobs:
  build-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build treasury-api
        uses: docker/build-push-action@v6
        with:
          context: app/services/api
          file: app/services/api/Dockerfile
          push: false

  build-migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build treasury-migrate
        uses: docker/build-push-action@v6
        with:
          context: app/services/api
          file: app/services/api/Dockerfile.migrate
          push: false

  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build treasury-web
        uses: docker/build-push-action@v6
        with:
          context: app
          file: app/Dockerfile.web
          push: false
