version: "2"
sql:
  - engine: "postgresql"
    queries: "db/queries/"
    schema: "migrations/"
    gen:
      go:
        package: "sqlc"
        out: "db/sqlc"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_empty_slices: true
        overrides:
          - db_type: "uuid"
            go_type: "github.com/google/uuid.UUID"
          - db_type: "timestamptz"
            go_type: "time.Time"
          - db_type: "numeric"
            go_type: "float64"
          - db_type: "uuid"
            nullable: true
            go_type: { import: "github.com/google/uuid", type: "UUID", pointer: true }
          - db_type: "timestamptz"
            nullable: true
            go_type: { type: "time.Time", pointer: true }
          - db_type: "text"
            nullable: true
            go_type: { type: "string", pointer: true }
          - db_type: "numeric"
            nullable: true
            go_type: { type: "float64", pointer: true }
