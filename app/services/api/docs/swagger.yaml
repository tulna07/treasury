      description: Cập nhật thông tin giao dịch ngoại tệ. Chỉ giao dịch ở trạng thái
        OPEN mới được sửa. Sử dụng optimistic locking (version).
      parameters:
      - description: FX Deal ID (UUID)
        in: path
