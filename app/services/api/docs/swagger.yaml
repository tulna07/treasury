  /fx/{id}/cancel:
    post:
      consumes:
      - application/json
      description: Yêu cầu hủy giao dịch ngoại tệ. Giao dịch sẽ chuyển sang trạng
        thái CANCELLED.
      parameters:
      - description: FX Deal ID (UUID)
