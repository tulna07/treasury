            - properties:
                error:
                  $ref: '#/definitions/github_com_kienlongbank_treasury-api_pkg_dto.APIError'
              type: object
      security:
      - BearerAuth: []
      summary: Xóa mềm giao dịch FX
      tags:
      - FX
    get:
      consumes:
      - application/json
      description: Lấy thông tin chi tiết một giao dịch ngoại tệ theo ID.
      parameters:
